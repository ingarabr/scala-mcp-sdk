$schema: https://raw.githubusercontent.com/oyvindberg/bleep/master/schema.json
$version: 0.0.12
jvm:
  name: graalvm-community:24.0.0
projects:
  schemas:
    extends: template-main
    dependencies:
      - io.circe::circe-core:0.14.10
      - io.circe::circe-generic:0.14.10
      - io.circe::circe-parser:0.14.10

  schemas-test:
    extends: template-test
    dependsOn: schemas
    dependencies:
      - org.scalameta::munit:1.1.0
      - org.typelevel::munit-cats-effect:2.0.0

  scripts:
    dependencies: build.bleep::bleep-plugin-ci-release:${BLEEP_VERSION}
    extends: template-main
    scala:
      version: 3.7.3

  server:
    extends: template-main
    dependsOn: schemas
    dependencies:
      - org.typelevel::cats-effect:3.5.7
      - org.typelevel::cats-parse:1.1.0
      - co.fs2::fs2-core:3.11.0
      - co.fs2::fs2-io:3.11.0

  server-test:
    extends: template-test
    dependsOn: server
    dependencies:
      - org.scalameta::munit:1.1.0
      - org.typelevel::munit-cats-effect:2.0.0

  server-http4s:
    extends: template-main
    dependsOn: server
    dependencies:
      - org.http4s::http4s-dsl:0.23.27
      - org.http4s::http4s-circe:0.23.27

  server-http4s-test:
    extends: template-test
    dependsOn: server-http4s
    dependencies:
      - org.scalameta::munit:1.1.0
      - org.typelevel::munit-cats-effect:2.0.0

  example-server-reference:
    extends: template-main
    folder: ./example-servers/reference
    dependsOn:
      - server
      - server-http4s
    dependencies:
      - org.http4s::http4s-ember-server:0.23.27
      - org.http4s::http4s-server:0.23.27
    platform:
      mainClass: examples.SimpleServer

  example-server-reference-test:
    extends: template-test
    folder: ./example-servers/reference-test
    dependsOn: example-server-reference
    dependencies:
      - org.scalameta::munit:1.1.0
      - org.typelevel::munit-cats-effect:2.0.0
      - org.http4s::http4s-ember-server:0.23.27
      - org.http4s::http4s-ember-client:0.23.27

  example-server-mcp-everything:
    extends: template-main
    folder: ./example-servers/mcp-everything
    dependsOn:
      - server
    platform:
      mainClass: everything.EverythingServer
  mcp-scripts:
    extends: template-main
    dependencies:
      - build.bleep::bleep-plugin-ci-release:${BLEEP_VERSION}
      - build.bleep::bleep-plugin-mdoc:${BLEEP_VERSION}
    dependsOn:
      - server-http4s

scripts:
  publish-locally:
    main: scripts.PublishLocal
    project: scripts
  publish:
    main: scripts.Publish
    project: scripts
  docs:
    project: mcp-scripts
    main: mcp.GenerateDocs

templates:
  template-common:
    platform:
      name: jvm
    scala:
      version: 3.3.4
      options:
        - -Xmax-inlines:64
        - -Wunused:all
        - -Wvalue-discard
        - -deprecation
        - -feature
        - -unchecked
        - -new-syntax
        - -source:3.3
        - -no-indent
      strict: true

  template-main:
    extends: template-common
    scala:
      options:
        - -Ycheck-all-patmat

  template-test:
    extends: template-common
    isTestProject: true
    scala:
      strict: false
